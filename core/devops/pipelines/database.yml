trigger:
- master

pool:
  vmImage: windows-2019

variables:
  solution: '**/*.sqlproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Release'
  sqlProjectPath: 'core/data_platform'
  warehousePath: 'transform/databases/data_warehouse'

stages:
- stage: Build
  jobs:
  - job: 'BuildControlDatabase'
    displayName: 'Build SQL Project'
    steps:
    - task: VSBuild@1
      inputs:
        solution: '$(sqlProjectPath)/*.sqlproj'
        msbuildArgs: '/p:Configuration=Release'
        platform: 'Any CPU'
        configuration: 'Release'

    - task: VSBuild@1
      inputs:
        solution: '$(warehousePath)/*.sqlproj'
        msbuildArgs: '/p:Configuration=Release'
        platform: 'Any CPU'
        configuration: 'Release'

    - task: CopyFiles@2
      inputs:
        targetFolder: '$(Build.ArtifactStagingDirectory)'    

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        artifact: 'drop'


- stage: Dev
  variables:
  - group: DEV
  dependsOn: build
  jobs:
  - job: 'DeployDatabase'
    displayName: 'Deploy SQL Databases'
    steps:
    - download: current
      artifact: drop

    - task: SqlAzureDacpacDeployment@1
      displayName: 'Deploy Control Database' 
      inputs:
        azureSubscription: 'azelia-dev-connection'
        AuthenticationType: 'servicePrincipal'
        ServerName: '$(controlServerName).database.windows.net'
        DatabaseName: '$(controlDatabaseName)' 
        deployType: 'DacpacTask'
        DeploymentAction: 'Publish'
        DacpacFile: '$(Pipeline.Workspace)/drop/core/data_platform/bin/debug/data_platform.dacpac'
        # PublishProfile: '$(Pipeline.Workspace)/drop/core/data_platform/data_platform.publish.xml'
        IpDetectionMethod: 'AutoDetect'


    - task: SqlAzureDacpacDeployment@1
      displayName: 'Deploy Data Warehouse' 
      inputs:
        azureSubscription: 'azelia-dev-connection'
        AuthenticationType: 'servicePrincipal'
        ServerName: '$(warehouseServerName).database.windows.net'
        DatabaseName: '$(warehouseDatabaseName)' 
        deployType: 'DacpacTask'
        DeploymentAction: 'Publish'
        DacpacFile: '$(Pipeline.Workspace)/drop/transform/databases/$(warehouseDatabaseName)/bin/debug/$(warehouseDatabaseName).dacpac'
        IpDetectionMethod: 'AutoDetect'